<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C&amp;J Budget Tracker</title>
  <link rel="stylesheet" href="css/styles.css?v=7" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="5" width="20" height="14" rx="2"/>
          <path d="M2 10h20"/>
        </svg>
        <span class="brand-text">C&amp;J Budget</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-link active" data-page="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="#transactions" class="nav-link" data-page="transactions">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12h6M9 16h4"/>
          </svg>
          <span class="nav-text">Transactions</span>
        </a>
        <a href="#upload" class="nav-link" data-page="upload">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span class="nav-text">Upload</span>
        </a>
        <a href="#export" class="nav-link" data-page="export">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span class="nav-text">Export</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="savings-panel">
          <div class="savings-title">Individual Savings</div>
          <div class="savings-row">
            <div class="savings-avatar savings-avatar--jack">J</div>
            <div class="savings-info">
              <span class="savings-name">Jack</span>
              <span class="savings-amount" id="sidebar-jack-savings">$0</span>
            </div>
          </div>
          <div class="savings-row">
            <div class="savings-avatar savings-avatar--courtney">C</div>
            <div class="savings-info">
              <span class="savings-name">Courtney</span>
              <span class="savings-amount" id="sidebar-courtney-savings">$0</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page page--active"></div>

      <!-- Transactions Page -->
      <div id="page-transactions" class="page"></div>

      <!-- Upload Page -->
      <div id="page-upload" class="page"></div>

      <!-- Export Page -->
      <div id="page-export" class="page"></div>
    </main>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
